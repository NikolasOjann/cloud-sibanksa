<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Bayar Iuran | Si-BankSa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Konfirmasi Pembayaran Iuran</h3>
            </div>
            <div class="card-body">
                <p class="text-muted">Transfer Iuran Kebersihan Rp 25.000 ke rekening RT: BCA 123456789 a.n Kas RT.</p>
                <form action="/iuran" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label>Nama Warga</label>
                        <input type="text" name="nama" class="form-control" required placeholder="Nama Anda">
                    </div>
                    <div class="mb-3">
                        <label>Pembayaran Untuk Bulan</label>
                        <select name="bulan" class="form-select">
                            <option value="April 2026">April 2026</option>
                            <option value="Mei 2026">Mei 2026</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Upload Bukti Transfer (S3)</label>
                        <input type="file" name="bukti" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Kirim Konfirmasi</button>
                    <a href="/" class="btn btn-outline-secondary w-100 mt-2">Batal / Kembali</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
