<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login | Si-BankSa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-success text-white d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-lg text-dark" style="width: 350px; border-radius: 15px;">
        <h3 class="text-center text-success mb-3">🌳 Si-BankSa</h3>
        <p class="text-center text-muted mb-4">Silakan masuk ke sistem</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-danger p-2 text-center">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="admin atau warga">
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="admin123 atau warga123">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">Login</button>
        </form>

        <hr>
        <div class="text-center" style="font-size: 0.85em;">
            <p class="mb-1"><strong>Akses Admin:</strong> admin / admin123</p>
            <p class="mb-0"><strong>Akses Warga:</strong> warga / warga123</p>
        </div>
    </div>
</body>
</html>
