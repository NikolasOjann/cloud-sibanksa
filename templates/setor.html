<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Catat Setoran | Si-BankSa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Catat Setoran Bank Sampah</h3>
            </div>
            <div class="card-body">
                <form action="/setor" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label>Nama Kepala Keluarga / Warga</label>
                        <input type="text" name="nama" class="form-control" required placeholder="Contoh: Bpk. Budi RT 01">
                    </div>
                    <div class="mb-3">
                        <label>Jenis Sampah Dominan</label>
                        <select name="jenis" class="form-select">
                            <option value="Plastik / Botol">Plastik / Botol</option>
                            <option value="Kardus / Kertas">Kardus / Kertas</option>
                            <option value="Besi / Logam">Besi / Logam</option>
                            <option value="Organik / Kompos">Organik / Kompos</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Berat (Kg)</label>
                        <input type="number" step="0.1" name="berat" class="form-control" required placeholder="0.0">
                    </div>
                    <div class="mb-3">
                        <label>Foto Bukti Timbangan (Upload S3)</label>
                        <input type="file" name="foto" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Simpan Setoran</button>
                    <a href="/" class="btn btn-outline-secondary w-100 mt-2">Batal / Kembali</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
