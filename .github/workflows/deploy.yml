name: CI/CD Pipeline Si-BankSa

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "."
          target: "/home/ec2-user/app"

      - name: Build and Run Docker on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd /home/ec2-user/app
            
            # Hentikan dan hapus container lama jika ada
            sudo docker stop sibanksa-container || true
            sudo docker rm sibanksa-container || true
            
            # Build ulang Docker Image
            sudo docker build -t sibanksa-image .
            
            # Jalankan Container baru dengan menyuntikkan Environment Variables
            sudo docker run -d -p 5000:5000 --name sibanksa-container \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_PASS="${{ secrets.DB_PASS }}" \
              sibanksa-image